        /**
         * @returns {Promise<FileSystemFileHandle|false|null>} handle | false=用户取消 | null=不支持 API
         */
        async function pickExportSaveFileHandle(suggestedBaseName) {
            if (typeof window.showSaveFilePicker !== 'function') {
                return null;
            }
            let name = (suggestedBaseName || '').trim() || 'rollout_export';
            if (!name.endsWith('.json')) name += '.json';
            try {
                return await window.showSaveFilePicker({
                    suggestedName: name,
                    types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
                });
            } catch (e) {
                if (e && e.name === 'AbortError') return false;
                throw e;
            }
        }

        async function writeJsonToFileHandle(handle, jsonStr) {
            const blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8' });
            const w = await handle.createWritable();
            await w.write(blob);
            await w.close();
        }

        function downloadExportJsonFile(baseName, jsonStr) {
            let name = baseName.trim() || 'rollout_export';
            if (!name.endsWith('.json')) name += '.json';
            const blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(function () {
                URL.revokeObjectURL(a.href);
            }, 5000);
            return true;
        }

        async function runDataExport() {
            const errEl = document.getElementById('exportError');
            errEl.style.display = 'none';
            errEl.textContent = '';
            const fromSel = document.getElementById('exportStepFrom');
            const toSel = document.getElementById('exportStepTo');
            const thresholdInp = document.getElementById('exportScoreThreshold');
            const filenameInp = document.getElementById('exportFilename');
            const nFrom = parseStepNum(fromSel.value);
            const nTo = parseStepNum(toSel.value);
            if (Number.isNaN(nFrom) || Number.isNaN(nTo)) {
                errEl.textContent = '请选择有效的 Step 范围。';
                errEl.style.display = 'block';
                return;
            }
            if (nFrom > nTo) {
                errEl.textContent = '起始 Step 不能大于结束 Step。';
                errEl.style.display = 'block';
                return;
            }
            const threshold = parseFloat(String(thresholdInp.value).trim());
            if (Number.isNaN(threshold)) {
                errEl.textContent = '请输入有效的 score 阈值。';
                errEl.style.display = 'block';
                return;
            }
            const sortedSteps = sortStepsByNum(stepsData);
            const stepsInRange = sortedSteps.filter(function (s) {
                const n = parseStepNum(s.name);
                return n >= nFrom && n <= nTo;
            });
            if (stepsInRange.length === 0) {
                errEl.textContent = '所选范围内没有 Step。';
                errEl.style.display = 'block';
                return;
            }

            const fn = filenameInp.value.trim() || 'rollout_export';
            const saveHandleEarly = await pickExportSaveFileHandle(fn);
            if (saveHandleEarly === false) {
                return;
            }

            exportCancelled = false;
            setExportBusy(true);
            document.getElementById('exportProgressWrap').style.display = 'block';
            resetExportLivePanel();
            showExportLivePanel();
            setExportProgressWorking(true);
            updateExportProgress(
                1,
                saveHandleEarly
                    ? '已选择保存位置，正在扫描摘要…'
                    : '正在扫描摘要（完成后将下载到浏览器默认目录）…'
            );
            setExportLivePhase(
                '<strong>阶段 1/2</strong> · 按问句聚类，筛「平均分 &lt; ' +
                    threshold +
                    '」的问句，并全局去重（与左侧列表「平均」一致）'
            );
            setExportLiveHit('<strong>全局去重问句：</strong>0 个');
            setExportLiveFetch('<strong>已拉取代表轨迹 JSON：</strong>—');

            try {
                /** @type {Map<string, { step: string, file: string, avgScore: number, stepIndex: number }>} */
                const questionBest = new Map();
                for (let si = 0; si < stepsInRange.length; si++) {
                    if (exportCancelled) throw new Error('已取消');
                    const step = stepsInRange[si];
                    const pctStepOnly = Math.round(
                        ((si + 1) / stepsInRange.length) * 100
                    );
                    updateExportProgress(
                        Math.max(1, pctStepOnly),
                        '摘要 ' +
                            (si + 1) +
                            '/' +
                            stepsInRange.length +
                            ' · ' +
                            step.name +
                            ' · 去重问句 ' +
                            questionBest.size +
                            ' 个'
                    );
                    setExportLiveHit(
                        '<strong>全局去重问句：</strong>' +
                            questionBest.size +
                            ' 个 · <strong>当前 Step：</strong>' +
                            step.name
                    );
                    const res = await fetchWithTimeout(
                        apiUrl('/api/summary?step=' + encodeURIComponent(step.name)),
                        {},
                        FETCH_TIMEOUT_SUMMARY_MS
                    );
                    if (!res.ok) throw new Error('摘要请求失败: ' + step.name + '（HTTP ' + res.status + '）');
                    const data = await res.json();
                    const summaries = data.summaries || [];
                    const aggregates = await aggregateSummariesForExportAsync(summaries);
                    let questionsPassingThisStep = 0;
                    for (let ci = 0; ci < aggregates.length; ci++) {
                        if (exportCancelled) throw new Error('已取消');
                        const row = aggregates[ci];
                        if (row.avgScore >= threshold) continue;
                        questionsPassingThisStep++;
                        if (!row.repFile) continue;
                        const key = row.content;
                        const prev = questionBest.get(key);
                        if (
                            !prev ||
                            row.avgScore < prev.avgScore - 1e-9 ||
                            (Math.abs(row.avgScore - prev.avgScore) < 1e-9 && si < prev.stepIndex)
                        ) {
                            questionBest.set(key, {
                                step: step.name,
                                file: row.repFile,
                                avgScore: row.avgScore,
                                stepIndex: si
                            });
                        }
                    }
                    setExportLiveHit(
                        '<strong>全局去重问句：</strong>' +
                            questionBest.size +
                            ' 个 · <strong>当前 Step：</strong>' +
                            step.name +
                            '（本 Step 符合条件 ' +
                            questionsPassingThisStep +
                            ' 个问句）'
                    );
                    appendExportStepLogRow(step.name, questionsPassingThisStep, questionBest.size);
                    const pctAfterStep = Math.round(
                        ((si + 1) / stepsInRange.length) * 100
                    );
                    updateExportProgress(
                        pctAfterStep,
                        '摘要 ' +
                            (si + 1) +
                            '/' +
                            stepsInRange.length +
                            ' 完成 · 去重问句 ' +
                            questionBest.size +
                            ' 个'
                    );
                }
                const jobs = Array.from(questionBest.values()).map(function (e) {
                    return { step: e.step, file: e.file };
                });
                if (jobs.length === 0) {
                    errEl.textContent = '没有平均分低于 ' + threshold + ' 的问句（请先确认左侧问句列表的「平均」与阈值）。';
                    errEl.style.display = 'block';
                    return;
                }
                setExportLivePhase(
                    '<strong>阶段 2/2</strong> · 每个问句 1 条代表轨迹，共 <strong>' + jobs.length + '</strong> 个 JSON'
                );
                setExportLiveFetch('<strong>已拉取代表轨迹 JSON：</strong>0 / ' + jobs.length);
                const out = [];
                const CONC = 16;
                let rollDone = 0;
                updateExportProgress(
                    0,
                    '阶段 2/2：拉取完整 JSON（数据量大时较慢）· 进度条表示本阶段 已拉取/总数'
                );
                for (let i = 0; i < jobs.length; i += CONC) {
                    if (exportCancelled) throw new Error('已取消');
                    const chunk = jobs.slice(i, i + CONC);
                    const batch = await Promise.all(
                        chunk.map(async function (job) {
                            const res = await fetchWithTimeout(
                                apiUrl(
                                    '/api/rollout?step=' +
                                        encodeURIComponent(job.step) +
                                        '&file=' +
                                        encodeURIComponent(job.file)
                                ),
                                {},
                                FETCH_TIMEOUT_ROLLOUT_MS
                            );
                            if (!res.ok) throw new Error('轨迹加载失败: ' + job.file + '（HTTP ' + res.status + '）');
                            return res.json();
                        })
                    );
                    batch.forEach(function (full) {
                        out.push(buildExportRecordFromRollout(full));
                    });
                    rollDone += chunk.length;
                    const pctRoll = Math.round((rollDone / jobs.length) * 100);
                    updateExportProgress(
                        pctRoll,
                        '拉取代表轨迹 ' +
                            rollDone +
                            '/' +
                            jobs.length +
                            ' · 导出条数 ' +
                            out.length
                    );
                    setExportLiveFetch(
                        '<strong>已拉取代表轨迹 JSON：</strong>' +
                            rollDone +
                            ' / ' +
                            jobs.length +
                            '（与去重问句数一致 ' +
                            out.length +
                            '）'
                    );
                }
                updateExportProgress(96, '正在写入文件…');
                setExportProgressWorking(false);
                const jsonStr = JSON.stringify(out, null, 2);
                if (saveHandleEarly) {
                    await writeJsonToFileHandle(saveHandleEarly, jsonStr);
                } else {
                    downloadExportJsonFile(fn, jsonStr);
                }
                updateExportProgress(100, '完成 · 共导出 ' + out.length + ' 条（去重问句）');
                document.getElementById('exportModal').style.display = 'none';
                document.getElementById('exportProgressWrap').style.display = 'none';
                resetExportLivePanel();
            } catch (e) {
                const msg = e && e.message ? e.message : String(e);
                errEl.textContent = msg === '已取消' ? '已取消导出。' : msg;
                errEl.style.display = 'block';
            } finally {
                setExportProgressWorking(false);
                setExportBusy(false);
            }
        }

        document.addEventListener('keydown', function (e) {
            const m = document.getElementById('exportModal');
            if (!m || m.style.display !== 'flex') return;
            if (e.key === 'Escape') closeExportModal();
        });

        /**
         * 导出专用：单次遍历聚合问句（平均分 + 组内最高分对应 file），避免排序/方差；大数据量时分片让出主线程。
         */
        async function aggregateSummariesForExportAsync(items) {
            const groups = new Map();
            const n = items.length;
            const YIELD_EVERY = 3500;
            for (let i = 0; i < n; i++) {
                const item = items[i];
                const q = item.question || '未找到user内容';
                const sc = rolloutScore(item);
                const f = item.file;
                const g = groups.get(q);
                if (!g) {
                    groups.set(q, { sum: sc, count: 1, bestFile: f, bestScore: sc });
                } else {
                    g.sum += sc;
                    g.count++;
                    if (sc > g.bestScore) {
                        g.bestScore = sc;
                        g.bestFile = f;
                    }
                }
                if (n > YIELD_EVERY && i > 0 && i % YIELD_EVERY === 0) {
                    await yieldExportToBrowser();
                }
            }
            const out = [];
            groups.forEach(function (g, content) {
                const avgRaw = g.count ? g.sum / g.count : 0;
                out.push({
                    content: content,
                    avgScore: parseFloat(avgRaw.toFixed(4)),
                    repFile: g.bestFile
                });
            });
            return out;
        }

        /**
         * 超大摘要时让出主线程，避免长时间脚本阻塞进度条与「卡顿感」。
         */
        async function yieldExportToBrowser() {
            await new Promise(function (resolve) {
                if (typeof requestAnimationFrame === 'function') {
                    requestAnimationFrame(function () {
                        resolve();
                    });
                } else {
                    setTimeout(resolve, 0);
                }
            });
        }

        /**
         * 与左侧问句列表同源：按 question 聚类，计算平均分 / 方差等（不写入 clusteredData）。
         * 导出时复用此逻辑，按 avgScore 筛选且每问句只取一条代表 rollout。
         */
        function buildQuestionClustersFromSummaries(items) {
            const groups = new Map();
            items.forEach(function (item) {
                const q = item.question || '未找到user内容';
                if (!groups.has(q)) groups.set(q, []);
                groups.get(q).push(item);
            });
            return Array.from(groups.entries()).map(function (entry) {
                const content = entry[0];
                const rollouts = entry[1];
                const sortedRollouts = rollouts.slice().sort(function (a, b) {
                    return rolloutScore(b) - rolloutScore(a);
                });
                const scores = sortedRollouts.map(function (r) {
                    return rolloutScore(r);
                });
                const avgScore = scores.length ? scores.reduce(function (sum, s) {
                    return sum + s;
                }, 0) / scores.length : 0;
                const firstS = scores.length ? scores[0] : 0;
                const allEqual =
                    scores.length <= 1 ||
                    scores.every(function (s) {
                        return Math.abs(s - firstS) < 1e-9;
                    });
                let variance = 0;
                if (scores.length > 1 && !allEqual) {
                    const mean = avgScore;
                    variance =
                        scores.reduce(function (sum, s) {
                            return sum + Math.pow(s - mean, 2);
                        }, 0) / scores.length;
                }
                return {
                    content: content,
                    rollouts: sortedRollouts,
                    count: sortedRollouts.length,
                    avgScore: parseFloat(avgScore.toFixed(4)),
                    variance: parseFloat(variance.toFixed(6)),
                    isConstant: allEqual
                };
            });
        }

        function sortQuestionClustersForDisplay(clusters) {
            return clusters.slice().sort(function (a, b) {
                if (a.isConstant !== b.isConstant) {
                    return a.isConstant ? 1 : -1;
                }
                return b.avgScore - a.avgScore;
            });
        }

        /** 摘要行或本地完整对象（可有 _full） - 已优化性能并增加方差计算 */
        function clusterFromSummaries(items) {
            clusteredData = sortQuestionClustersForDisplay(buildQuestionClustersFromSummaries(items));
        }

        function clusterData(rollouts) {
            let i = 0;
            const items = rollouts.map(rollout => {
                const messages = rollout.messages || [];
                let extractedQuestion = '';
                for (let j = messages.length - 1; j >= 0; j--) {
                    if (messages[j].role === 'user') {
                        const c = messages[j].content;
                        let raw = contentToPlainTextForExtraction(c);
                        if (!raw.trim()) {
                            raw =
                                typeof c === 'string'
                                    ? c
                                    : normalizeMsgContent(c) || JSON.stringify(c);
                        }
                        extractedQuestion = extractQuestion(raw);
                        break;
                    }
                }
                if (!extractedQuestion) {
                    extractedQuestion = '未找到user内容';
                }
                return {
                    file: 'local_' + (i++),
                    score: rolloutScore(rollout),
                    question: extractedQuestion,
                    request_id: rollout.request_id,
                    timestamp: rollout.timestamp,
                    run_time: rollout.run_time,
                    _full: rollout
                };
            });
            clusterFromSummaries(items);
        }

        /** 按类别得到聚类下标，并在类别内按方差降序（恒定类方差均为 0 时按平均分降序） */
        function getSortedClusterIndicesForCategory(filter) {
            const all = clusteredData.map((_, i) => i);
            let idxs = all;
            if (filter === 'variable') {
                idxs = all.filter((i) => !clusteredData[i].isConstant);
                idxs.sort((a, b) => clusteredData[b].variance - clusteredData[a].variance);
            } else if (filter === 'constant') {
                idxs = all.filter((i) => clusteredData[i].isConstant);
                idxs.sort((a, b) => {
                    const dv = clusteredData[b].variance - clusteredData[a].variance;
                    if (Math.abs(dv) > 1e-12) {
                        return dv;
                    }
                    return clusteredData[b].avgScore - clusteredData[a].avgScore;
                });
            } else {
                idxs = [...all];
            }
            return idxs;
        }

        function getFilteredQuestionIndices(query) {
            const q = (query || '').trim().toLowerCase();
            const baseOrder = getSortedClusterIndicesForCategory(questionCategoryFilter);
            if (!q) {
                return baseOrder;
            }
            return baseOrder.filter((i) => String(clusteredData[i].content).toLowerCase().includes(q));
        }

        function setQuestionCategoryFilter(filter) {
            if (questionCategoryFilter === filter) {
                questionCategoryFilter = 'all';
            } else {
                questionCategoryFilter = filter;
            }
            document.querySelectorAll('.variance-filter-chip').forEach((el) => {
                const f = el.getAttribute('data-filter') || '';
                el.classList.toggle('active', f === questionCategoryFilter);
            });
            applyQuestionFilter();
        }

        function syncVarianceChipActive() {
            document.querySelectorAll('.variance-filter-chip').forEach((el) => {
                const f = el.getAttribute('data-filter') || '';
                el.classList.toggle('active', f === questionCategoryFilter);
            });
        }

        async function copyClusterQuestion(clusterIdx, btn) {
            const c = clusteredData[clusterIdx];
            if (!c || typeof c.content !== 'string') {
                return;
            }
            const text = c.content;
            try {
                await navigator.clipboard.writeText(text);
                if (btn) {
                    const prev = btn.textContent;
                    btn.textContent = '已复制';
                    btn.classList.add('question-copy-btn-done');
                    setTimeout(function () {
                        btn.textContent = prev;
                        btn.classList.remove('question-copy-btn-done');
                    }, 1600);
                }
            } catch {
                alert('复制失败，请检查浏览器剪贴板权限，或手动选中问句文本复制。');
            }
        }

        function renderQuestionListItems(indices) {
            if (!indices.length) {
                return '<div class="question-list-empty">无匹配问句，请调整关键字或清空搜索</div>';
            }
            let prevCat = null;
            const blocks = [];
            for (const idx of indices) {
                const c = clusteredData[idx];
                const cat = c.isConstant ? 'const' : 'var';
                if (cat !== prevCat) {
                    if (cat === 'var') {
                        blocks.push(`
                            <div class="question-section-header">
                                方差 ≠ 0（分数有变化）
                                <span class="section-hint">同问句下多条 Rollout 的 score 不完全相同</span>
                            </div>`);
                    } else {
                        blocks.push(`
                            <div class="question-section-header const-header">
                                方差 = 0（分数恒定）
                                <span class="section-hint">同问句下 score 完全相同（如全 1、全 0）</span>
                            </div>`);
                    }
                    prevCat = cat;
                }
                blocks.push(`
                <div class="question-item ${idx === currentClusterIndex ? 'active' : ''}" data-index="${idx}" onclick="selectQuestion(${idx})">
                    <div class="question-item-top">
                        <div class="question-text">${escapeHtml(c.content)}</div>
                        <button type="button" class="question-copy-btn" title="复制该问句全文" aria-label="复制问句" tabindex="0" onclick="event.stopPropagation(); void copyClusterQuestion(${idx}, this);">复制</button>
                    </div>
                    <div class="question-meta">
                        <span class="question-badge">样本: ${c.count}</span>
                        <span class="question-badge">平均: ${c.avgScore.toFixed(3)}</span>
                        <span class="question-badge">方差: ${c.variance.toFixed(6)}</span>
                        ${c.isConstant
                            ? '<span class="question-badge" style="background:#10b981;color:white;">恒定</span>'
                            : '<span class="question-badge" style="background:#f59e0b;color:white;">变化</span>'}
                    </div>
                </div>`);
            }
            return blocks.join('');
        }

        function updateQuestionListTitle(filteredCount, total, hasQuery) {
            const titleEl = document.getElementById('questionListTitle');
            if (!titleEl) {
                return;
            }
            if (hasQuery) {
                titleEl.textContent = '问句列表 (' + filteredCount + '/' + total + ')';
            } else {
                titleEl.textContent = '问句列表 (' + total + ')';
            }
        }

        function applyQuestionFilter() {
            const inp = document.getElementById('questionSearchInput');
            const q = inp ? inp.value : '';
            const listEl = document.getElementById('questionList');
            if (!listEl || !clusteredData.length) {
                return;
            }
            const indices = getFilteredQuestionIndices(q);
            const total = clusteredData.length;
            const hasQuery = !!(q && q.trim());
            updateQuestionListTitle(indices.length, total, hasQuery);
            listEl.innerHTML = renderQuestionListItems(indices);

            if (!indices.length) {
                currentClusterIndex = -1;
                currentRolloutIndex = -1;
                setDetailJsonToolbarVisible(false);
                const rolloutPanel = document.getElementById('rolloutPanel');
                if (rolloutPanel) {
                    rolloutPanel.innerHTML = `
                        <div class="rollout-panel-header">
                            <div class="rollout-panel-title">🎯 Rollout</div>
                            <div class="rollout-panel-meta"><span>无匹配问句</span></div>
                        </div>
                        <div class="rollout-list">
                            <div class="question-list-empty">请修改搜索条件</div>
                        </div>`;
                }
                const detailContent = document.querySelector('.detail-content');
                if (detailContent) {
                    detailContent.innerHTML = `
                        <div class="detail-empty">
                            <div class="detail-empty-icon">🔍</div>
                            <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">当前无匹配问句</div>
                            <div style="font-size: 14px;">清空搜索框或更换关键字以显示问句列表</div>
                        </div>`;
                }
                return;
            }

            if (!indices.includes(currentClusterIndex)) {
                selectQuestion(indices[0]);
            }
        }

        function onQuestionSearchKeydown(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                const inp = document.getElementById('questionSearchInput');
                if (inp) {
                    inp.value = '';
                    applyQuestionFilter();
                }
            }
        }

        function renderLayout() {
            const contentDiv = document.getElementById('content');

            // 更新统计信息
            const totalRollouts = clusteredData.reduce((sum, c) => sum + c.count, 0);
            const totalClusters = clusteredData.length;
            const avgScore = totalRollouts > 0 ?
                (clusteredData.reduce((sum, c) => sum + c.avgScore * c.count, 0) / totalRollouts).toFixed(3) : '0';

            // 显示当前step信息 + 新增方差分类统计
            const currentStep = currentStepIndex >= 0 ? stepsData[currentStepIndex] : null;

            const variableCount = clusteredData.length - constantCount;

            document.getElementById('stats').innerHTML = `
                ${currentStep ? `<div class="stat-item"><strong>当前Step:</strong> ${currentStep.name}</div>` : ''}
                <div class="stat-item"><strong>总样本数:</strong> ${totalRollouts}</div>
                <div class="stat-item"><strong>聚类数:</strong> ${totalClusters}</div>
                <div class="stat-item"><strong>恒定分数:</strong> ${constantCount} <small>(方差=0)</small></div>
                <div class="stat-item"><strong>变化分数:</strong> ${variableCount}</div>
                <div class="stat-item"><strong>平均分数:</strong> ${avgScore}</div>
            `;

            currentClusterIndex = 0;
            currentRolloutIndex = -1;
            questionCategoryFilter = 'all';

            // 三栏布局：左侧问句（带方差分类） | 中间详情（最大） | 右侧Rollout
            contentDiv.innerHTML = `
                <div class="main-content">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            📋 <span id="questionListTitle">问句列表 (${totalClusters})</span>
                            <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;">
                                <span class="variance-filter-chip var-chip" data-filter="variable" role="button" tabindex="0" title="仅显示分数有变化的问句，按方差从大到小" onclick="setQuestionCategoryFilter('variable')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setQuestionCategoryFilter('variable');}">变化 · ${variableCount} 问句</span>
                                <span class="variance-filter-chip const-chip" data-filter="constant" role="button" tabindex="0" title="仅显示分数恒定的问句；方差相同时按平均分从高到低" onclick="setQuestionCategoryFilter('constant')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setQuestionCategoryFilter('constant');}">恒定 · ${constantCount} 问句</span>
                            </div>
                            <div style="margin-top:8px;font-size:12px;color:#86868b;line-height:1.45;">
                                下方按「方差≠0 / 方差=0」分组展示，与顶部「聚类数 / 恒定分数」统计一致。
                            </div>
                        </div>
                        <div class="question-search-wrap">
                            <input type="search" id="questionSearchInput" placeholder="搜索问句关键字…" autocomplete="off" oninput="applyQuestionFilter()" onkeydown="onQuestionSearchKeydown(event)" />
                        </div>
                        <div class="question-list" id="questionList"></div>
                    </div>

                    <div class="detail-panel" id="detailPanel">
                        <div class="detail-panel-header">
                            <div class="detail-panel-header-row">
                                <div class="detail-panel-title">📝 Rollout 详细内容</div>
                                <div class="detail-json-toolbar-inline" id="detailJsonToolbar" style="display: none;" aria-hidden="true">
                                    <button type="button" class="btn-json-toggle" id="btnToggleRawJson" onclick="toggleDetailRawJson()">查看原始 JSON</button>
                                    <button type="button" class="btn-json-toggle" id="btnCopyRawJson" onclick="copyDetailRawJson()">复制 JSON</button>
                                </div>
                            </div>
                        </div>
                        <div class="detail-content">
                            <div class="detail-empty">
                                <div class="detail-empty-icon">👈</div>
                                <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">请先选择问句和Rollout</div>
                                <div style="font-size: 14px;">点击左侧问句，再点击右侧的任一 Rollout 查看完整轨迹</div>
                                <div style="font-size: 14px; margin-top: 8px; opacity: 0.7;">系统将自动定位到最后一条 Assistant 回答</div>
                            </div>
                        </div>
                    </div>

                    <div class="rollout-panel" id="rolloutPanel">
                        ${renderRolloutList(0)}
                    </div>
                </div>
            `;

            const listEl = document.getElementById('questionList');
            if (listEl) {
                listEl.innerHTML = renderQuestionListItems(getFilteredQuestionIndices(''));
            }
            syncVarianceChipActive();
        }

        function selectQuestion(index) {
            currentClusterIndex = index;

            // 更新左侧列表选中状态（按 data-index，与搜索过滤后的 DOM 顺序无关）
            document.querySelectorAll('.question-item').forEach((item) => {
                const idx = parseInt(item.getAttribute('data-index'), 10);
                if (idx === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // 更新右侧 rollout 列表（已按分数从高到低排序，索引 0 为最高分）
            document.getElementById('rolloutPanel').innerHTML = renderRolloutList(index);

            const cluster = clusteredData[index];
            if (cluster && cluster.rollouts && cluster.rollouts.length > 0) {
                void selectRolloutAsync(index, 0);
            } else {
                currentRolloutIndex = -1;
                setDetailJsonToolbarVisible(false);
                document.querySelector('.detail-content').innerHTML = `
                    <div class="detail-empty">
                        <div class="detail-empty-icon">📭</div>
                        <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">该问句下暂无 Rollout</div>
                    </div>
                `;
            }
        }

        function scoreBarClass(score) {
            if (score > 0.5) return 'bar-high';
            if (score > 0) return 'bar-medium';
            if (score === 0) return 'bar-low';
            return 'bar-negative';
        }

        function renderRolloutList(clusterIdx) {
            const cluster = clusteredData[clusterIdx];
            const scores = cluster.rollouts.map((r) => rolloutScore(r));
            const maxScore = scores.length ? Math.max(...scores) : 0;
            const minScore = scores.length ? Math.min(...scores) : 0;

            return `
                <div class="rollout-panel-header">
                    <div class="rollout-panel-title">🎯 Rollout（相对最高分）</div>
                    <div class="rollout-panel-meta">
                        <span>共 ${cluster.count} 条</span>
                        <span>最高 ${maxScore.toFixed(3)}</span>
                        <span>最低 ${minScore.toFixed(3)}</span>
                    </div>
                </div>
                <div class="rollout-list">
                    ${cluster.rollouts.map((rollout, rolloutIdx) => renderRolloutItem(rollout, clusterIdx, rolloutIdx, maxScore, minScore)).join('')}
                </div>
            `;
        }

        function renderRolloutItem(rollout, clusterIdx, rolloutIdx, maxScore, minScore) {
            const score = rolloutScore(rollout);
            const delta = score - maxScore;
            const deltaStr = delta === 0 ? '与最高相同' : (delta >= 0 ? '' : '较最高 ' + delta.toFixed(3));
            const range = maxScore - minScore;
            const barPct = range === 0 ? 100 : Math.max(5, Math.min(100, ((score - minScore) / range) * 100));

            return `
                <div class="rollout-item" role="button" tabindex="0" onclick="selectRollout(${clusterIdx}, ${rolloutIdx})">
                    <div class="rollout-info">
                        <div class="score-compact">
                            <span class="score-value">${score.toFixed(3)}</span>
                            <span class="score-delta ${delta === 0 ? 'best' : ''}">${deltaStr}</span>
                            <div class="score-bar-track" aria-hidden="true">
                                <div class="score-bar-fill ${scoreBarClass(score)}" style="width: ${barPct}%;"></div>
                            </div>
                        </div>
                        <div class="rollout-meta">
                            <div><strong>ID</strong> ${rollout.request_id?.substring(0, 8) || 'N/A'}</div>
                            <div><strong>时间</strong> ${rollout.timestamp?.substring(11, 19) || 'N/A'} · <strong>运行</strong> ${rollout.run_time?.toFixed(2) || 'N/A'}s</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function scrollDetailToLastAssistant() {
            const panel = document.querySelector('.detail-content');
            const target = document.getElementById('last-assistant-anchor');
            if (!panel || !target) {
                return;
            }
            const run = () => {
                const pRect = panel.getBoundingClientRect();
                const tRect = target.getBoundingClientRect();
                const nextTop = panel.scrollTop + (tRect.top - pRect.top) - 12;
                panel.scrollTo({ top: Math.max(0, nextTop), behavior: 'smooth' });
            };
            requestAnimationFrame(() => requestAnimationFrame(run));
        }

        function selectRollout(clusterIdx, rolloutIdx) {
            void selectRolloutAsync(clusterIdx, rolloutIdx);
        }

        async function selectRolloutAsync(clusterIdx, rolloutIdx) {
            currentRolloutIndex = rolloutIdx;

            document.querySelectorAll('.rollout-item').forEach((item, idx) => {
                if (idx === rolloutIdx) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });

            const slot = clusteredData[clusterIdx].rollouts[rolloutIdx];
            const detailEl = document.querySelector('.detail-content');

            if (slot._full) {
                detailEl.innerHTML = renderRolloutDetail(slot._full);
                bindCollapseEvents();
                finalizeRolloutDetailView();
                scrollDetailToLastAssistant();
                return;
            }

            if (currentStepIndex < 0 || !stepsData[currentStepIndex]) {
                setDetailJsonToolbarVisible(false);
                detailEl.innerHTML = '<div class="detail-empty">无法加载：缺少 Step 上下文</div>';
                return;
            }

            setDetailJsonToolbarVisible(false);
            detailEl.innerHTML =
                '<div class="loading" style="padding:24px;"><div class="loading-spinner"></div><div>正在加载完整轨迹…</div></div>';

            try {
                const step = stepsData[currentStepIndex];
                const r = await fetchWithTimeout(
                    apiUrl(
                        '/api/rollout?step=' +
                            encodeURIComponent(step.name) +
                            '&file=' +
                            encodeURIComponent(slot.file)
                    ),
                    {},
                    FETCH_TIMEOUT_ROLLOUT_MS
                );
                let full = null;
                let bodyText = '';
                try {
                    full = await r.json();
                } catch (e) {
                    try {
                        bodyText = await r.text();
                    } catch {
                        bodyText = '';
                    }
                }

                if (!r.ok || (full && full.error)) {
                    const msg =
                        (full && (full.error || full.message)) || bodyText || r.statusText || '加载失败';
                    throw new Error(msg);
                }
                slot._full = full || {};
                detailEl.innerHTML = renderRolloutDetail(slot._full);
                bindCollapseEvents();
                finalizeRolloutDetailView();
                scrollDetailToLastAssistant();
            } catch (err) {
                let msg = err instanceof Error ? err.message : String(err);
                if (err && err.name === 'AbortError') {
                    msg = '加载单条轨迹超时，请重试或检查 json 文件是否过大。';
                }
                setDetailJsonToolbarVisible(false);
                detailEl.innerHTML = `<div class="detail-empty"><div class="detail-empty-icon">⚠️</div><div>${escapeHtml(msg)}</div></div>`;
            }
        }

        function bindCollapseEvents() {
            document.querySelectorAll('.message-header').forEach(header => {
                header.addEventListener('click', function() {
                    const message = this.parentElement;
                    message.classList.toggle('collapsed');
                });
            });
        }

        let detailRolloutPayload = null;

        function setDetailJsonToolbarVisible(visible) {
            const t = document.getElementById('detailJsonToolbar');
            if (!t) {
                return;
            }
            t.style.display = visible ? 'flex' : 'none';
            t.setAttribute('aria-hidden', visible ? 'false' : 'true');
        }

        function resetDetailRawJsonPanel() {
            const panel = document.getElementById('detailRawJsonPanel');
            const btn = document.getElementById('btnToggleRawJson');
            const tree = document.getElementById('detailRawJsonTree');
            if (panel) {
                panel.style.display = 'none';
            }
            if (btn) {
                btn.textContent = '查看原始 JSON';
            }
            if (tree) {
                tree.innerHTML = '';
            }
        }

        function finalizeRolloutDetailView() {
            setDetailJsonToolbarVisible(true);
            resetDetailRawJsonPanel();
        }

        function jsonPreviewObject(o) {
            if (o === null || typeof o !== 'object') {
                return '';
            }
            if (Array.isArray(o)) {
                return '[' + o.length + ']';
            }
            return '{' + Object.keys(o).length + ' keys}';
        }

        function renderFoldableJsonValue(val, depth) {
            const maxOpenDepth = 1;
            if (val === null) {
                return '<span class="json-lit">null</span>';
            }
            const t = typeof val;
            if (t === 'string') {
                if (val.length > 240) {
                    return (
                        '<details class="json-node json-string-fold">' +
                        '<summary class="json-summary json-lit">字符串 · ' +
                        val.length +
                        ' 字符（点击展开）</summary><div class="json-children"><span class="json-lit json-str">' +
                        escapeHtml(JSON.stringify(val)) +
                        '</span></div></details>'
                    );
                }
                return '<span class="json-lit">' + escapeHtml(JSON.stringify(val)) + '</span>';
            }
            if (t === 'number' || t === 'boolean') {
                return '<span class="json-lit">' + String(val) + '</span>';
            }
            if (t !== 'object') {
                return '<span class="json-lit">' + escapeHtml(String(val)) + '</span>';
            }
            if (Array.isArray(val)) {
                if (val.length === 0) {
                    return '<span class="json-lit">[]</span>';
                }
                const items = val.map(function (item, i) {
                    if (item !== null && typeof item === 'object') {
                        return (
                            '<details class="json-node"><summary class="json-summary"><span class="json-idx">[' +
                            i +
                            ']</span> ' +
                            escapeHtml(jsonPreviewObject(item)) +
                            '</summary><div class="json-children">' +
                            renderFoldableJsonValue(item, depth + 1) +
                            '</div></details>'
                        );
                    }
                    return (
                        '<div class="json-row"><span class="json-idx">[' +
                        i +
                        ']</span> ' +
                        renderFoldableJsonValue(item, depth + 1) +
                        '</div>'
                    );
                });
                return '<div class="json-array">' + items.join('') + '</div>';
            }
            const keys = Object.keys(val);
            if (keys.length === 0) {
                return '<span class="json-lit">{}</span>';
            }
            const openAttr = depth < maxOpenDepth ? ' open' : '';
            const rows = keys.map(function (k) {
                const v = val[k];
                const keyHtml = escapeHtml(JSON.stringify(k));
                if (v !== null && typeof v === 'object') {
                    return (
                        '<details class="json-node"' +
                        openAttr +
                        '><summary class="json-summary">' +
                        keyHtml +
                        ': ' +
                        escapeHtml(jsonPreviewObject(v)) +
                        '</summary><div class="json-children">' +
                        renderFoldableJsonValue(v, depth + 1) +
                        '</div></details>'
                    );
                }
                return (
                    '<div class="json-row"><span class="json-key">' +
                    keyHtml +
                    '</span>: ' +
                    renderFoldableJsonValue(v, depth + 1) +
                    '</div>'
                );
            });
            return '<div class="json-object">' + rows.join('') + '</div>';
        }

        function renderFoldableJsonRoot(payload) {
            try {
                return '<div class="json-fold-root">' + renderFoldableJsonValue(payload, 0) + '</div>';
            } catch (e) {
                return '<div class="json-err">' + escapeHtml(String(e)) + '</div>';
            }
        }

        function toggleDetailRawJson() {
            const panel = document.getElementById('detailRawJsonPanel');
            const tree = document.getElementById('detailRawJsonTree');
            const btn = document.getElementById('btnToggleRawJson');
            if (!panel || !tree) {
                return;
            }
            const hidden = panel.style.display === 'none' || panel.style.display === '';
            if (hidden) {
                try {
                    tree.innerHTML = renderFoldableJsonRoot(detailRolloutPayload);
                } catch (e) {
                    tree.innerHTML = '<div class="json-err">' + escapeHtml(String(e)) + '</div>';
                }
                panel.style.display = 'block';
                if (btn) {
                    btn.textContent = '隐藏原始 JSON';
                }
                requestAnimationFrame(function () {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                });
            } else {
                panel.style.display = 'none';
                if (btn) {
                    btn.textContent = '查看原始 JSON';
                }
                tree.innerHTML = '';
            }
        }

        async function copyDetailRawJson() {
            if (!detailRolloutPayload) {
                return;
            }
            const t = JSON.stringify(detailRolloutPayload, null, 2);
            try {
                await navigator.clipboard.writeText(t);
                const b = document.getElementById('btnCopyRawJson');
                if (b) {
                    const o = b.textContent;
                    b.textContent = '已复制';
                    setTimeout(function () {
                        b.textContent = o;
                    }, 1600);
                }
            } catch {
                alert('复制失败，请检查浏览器剪贴板权限，或稍后重试。');
            }
        }

        function renderRolloutDetail(rollout) {
            detailRolloutPayload = rollout;
            return `
                ${renderMessages(rollout.messages)}
                ${renderRewardInfo(rollout.reward)}
                ${renderMetadata(rollout)}
                <div id="detailRawJsonPanel" class="detail-raw-json" style="display: none;">
                    <div class="detail-raw-json-head">原始 JSON（点击节点标题展开/折叠；复制仍使用完整 JSON 文本）</div>
                    <div id="detailRawJsonTree" class="detail-raw-json-tree"></div>
                </div>
            `;
        }

        function renderMessages(messages) {
            if (!messages || messages.length === 0) return '<p>无消息数据</p>';

            beginMessageRender();

            let lastAssistantIndex = -1;
            for (let i = messages.length - 1; i >= 0; i--) {
                if (messages[i].role === 'assistant') {
                    lastAssistantIndex = i;
                    break;
                }
            }

            let lastUserIndex = -1;
            for (let j = messages.length - 1; j >= 0; j--) {
                if (messages[j].role === 'user') {
                    lastUserIndex = j;
                    break;
                }
            }

            return `
                <div class="messages-container">
                    ${messages.map((msg, idx) => {
                        const roleClass = `message-${msg.role}`;
                        const rawContent = msg.content;
                        const shouldCollapse = idx !== lastAssistantIndex;
                        const isLastAssistant = idx === lastAssistantIndex && msg.role === 'assistant';
                        const isLastUser = idx === lastUserIndex && msg.role === 'user';

                        let bodyHtml = '';
                        if (Array.isArray(rawContent)) {
                            if (msg.role === 'system') {
                                const plain = contentToPlainTextForExtraction(rawContent);
                                if (plain.length > 500) {
                                    bodyHtml =
                                        '<pre>' +
                                        escapeHtml(plain.substring(0, 500)) +
                                        '... (已截断)</pre>';
                                } else {
                                    bodyHtml = renderContentPartsArray(rawContent, msg.role);
                                }
                            } else if (isLastAssistant) {
                                bodyHtml = renderAssistantPartsSequential(rawContent);
                            } else {
                                bodyHtml = renderContentPartsArray(rawContent, msg.role);
                            }
                        } else {
                            let str = rawContent == null ? '' : String(rawContent);
                            if (msg.role === 'system' && str.length > 500) {
                                str = str.substring(0, 500) + '... (已截断)';
                            }
                            if (msg.role === 'assistant') {
                                bodyHtml = isLastAssistant
                                    ? renderAssistantContent(str)
                                    : renderSegmentWithToolCalls(str);
                            } else {
                                bodyHtml = isLastAssistant
                                    ? renderAssistantContent(str)
                                    : '<pre>' + escapeHtml(str) + '</pre>';
                            }
                        }

                        const extraClass = isLastUser ? ' message-user-current' : '';

                        return `
                            <div class="message ${roleClass}${extraClass} ${shouldCollapse ? 'collapsed' : ''}" ${isLastAssistant ? 'id="last-assistant-anchor"' : ''}>
                                <div class="message-header">
                                    <div class="message-header-left">
                                        <span>${msg.role} ${msg.generation_time ? `(生成: ${msg.generation_time.toFixed(2)}s)` : ''}</span>
                                        ${isLastUser ? '<span class="current-turn-badge">当前问句</span>' : ''}
                                        <span class="message-index">#${idx + 1}</span>
                                    </div>
                                    <span class="collapse-icon">▼</span>
                                </div>
                                <div class="message-content">
                                    ${bodyHtml}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderAssistantContent(content) {
            const str = typeof content === 'string' ? content : String(content ?? '');
            // 检查是否包含</think>
            if (str.includes('</think>')) {
                const parts = str.split('</think>');
                const thinkContent = parts[0].replace(/<think>/g, '').trim();
                const answerContent = parts.slice(1).join('</think>').trim();

                return `
                    ${thinkContent ? `
                        <div class="think-section">
                            <div class="think-title">思维链</div>
                            ${renderSegmentWithToolCalls(thinkContent)}
                        </div>
                    ` : ''}
                    ${answerContent ? renderSegmentWithToolCalls(answerContent) : ''}
                `;
            } else {
                return renderSegmentWithToolCalls(str);
            }
        }

        function splitTableRow(line) {
            const t = line.trim();
            if (!t.startsWith('|')) return [];
            return t.split('|').slice(1, -1).map((c) => c.trim());
        }

        function isSeparatorTableRow(line) {
            const cells = splitTableRow(line);
            if (cells.length < 2) return false;
            return cells.every((c) => {
                const x = c.replace(/\s/g, '');
                return /^:?-{1,}:?$/.test(x);
            });
        }

        function isTableRowLine(line) {
            const t = line.trim();
            return t.startsWith('|') && t.endsWith('|') && t.includes('|', 1);
        }

        function cellInlineMd(raw) {
            let h = escapeHtml(raw);
            h = h.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            return h;
        }

        function parseAlignmentCell(sepCell) {
            const x = sepCell.replace(/\s/g, '');
            if (/^:[-]+:$/.test(x)) return 'center';
            if (/^[-]+:$/.test(x)) return 'right';
            return 'left';
        }

        function buildTableHtml(blockLines, sepIdx) {
            const header = splitTableRow(blockLines[0]);
            if (!header.length) return '';
            const alignCells = splitTableRow(blockLines[sepIdx]);
            const aligns = header.map((_, i) => parseAlignmentCell(alignCells[i] || '---'));
            const bodyRows = blockLines.slice(sepIdx + 1).map(splitTableRow);
            let html = '<table><thead><tr>';
            header.forEach((h, i) => {
                html += `<th style="text-align:${aligns[i]}">${cellInlineMd(h)}</th>`;
            });
            html += '</tr></thead><tbody>';
            for (const row of bodyRows) {
                html += '<tr>';
                for (let i = 0; i < header.length; i++) {
                    const cell = row[i] !== undefined ? row[i] : '';
                    html += `<td style="text-align:${aligns[i]}">${cellInlineMd(cell)}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            return html;
        }

        /** 抽出 GFM 管道表格，避免被段落逻辑拆散 */
        function extractPipeTables(text) {
            const lines = text.split(/\r?\n/);
            const tables = [];
            const out = [];
            let i = 0;
            while (i < lines.length) {
                if (isTableRowLine(lines[i])) {
                    const start = i;
                    let j = i;
                    while (j < lines.length && isTableRowLine(lines[j])) j++;
                    const block = lines.slice(start, j);
                    const sepIdx = block.findIndex(isSeparatorTableRow);
                    if (sepIdx === 1 && block.length >= 2) {
                        const tableHtml = buildTableHtml(block, sepIdx);
                        if (tableHtml) {
                            const id = tables.length;
                            tables.push(tableHtml);
                            out.push('');
                            out.push(`<<<TABLE_${id}>>>`);
                            out.push('');
                            i = j;
                            continue;
                        }
                    }
                }
                out.push(lines[i]);
                i++;
            }
            return { text: out.join('\n'), tables };
        }

        function isHorizontalRuleLine(line) {
            const t = line.trim();
            if (t.length < 3) return false;
            return /^(-{3,}|\*{3,}|_{3,})$/.test(t);
        }

        /** 独立一行的 --- / *** / ___ 转为占位符（表格已在 extractPipeTables 中剥离） */
        function replaceHorizontalRules(text) {
            return text
                .split(/\r?\n/)
                .map((line) => (isHorizontalRuleLine(line) ? '\nMD_HORIZONTAL_RULE_PLACEHOLDER\n' : line))
                .join('\n');
        }

        const UL_ITEM_RE = /^(\s*)([-*+])\s+(.+)$/;
        const OL_ITEM_RE = /^(\s*)(\d+)\.\s+(.+)$/;
        const LIST_CONTINUATION_RE = /^(\t| {2,})\S/;
        /** 有序列表项下常见的子要点「 - xxx」仅一个前导空格，需并入同一条 li，否则会插入 ul 把 2. 拆成新 ol 导致序号全显示为 1 */
        const LIST_SUB_BULLET_RE = /^\s+[-*+]\s+\S/;

        /**
         * 收集列表项并把「下一行缩进段落 / 中间空行」并入当前 li，避免每个 1. 2. 被拆成多个单条 ol 而都显示成 1.
         */
        function collectListItemsWithContinuations(lines, startIdx, kind) {
            const itemRe = kind === 'ol' ? OL_ITEM_RE : UL_ITEM_RE;
            const block = [];
            let i = startIdx;
            while (i < lines.length && itemRe.test(lines[i])) {
                const m = lines[i].match(itemRe);
                let itemRaw = m[3];
                const indent = m[1].replace(/\t/g, '    ').length;
                i++;
                while (i < lines.length) {
                    const L2 = lines[i];
                    if (OL_ITEM_RE.test(L2) || UL_ITEM_RE.test(L2)) {
                        break;
                    }
                    if (!L2.trim()) {
                        let j = i;
                        while (j < lines.length && !lines[j].trim()) {
                            j++;
                        }
                        if (j >= lines.length) {
                            i = j;
                            break;
                        }
                        if (OL_ITEM_RE.test(lines[j]) || UL_ITEM_RE.test(lines[j])) {
                            i = j;
                            break;
                        }
                        itemRaw += '\n';
                        i++;
                        continue;
                    }
                    if (LIST_CONTINUATION_RE.test(L2) || LIST_SUB_BULLET_RE.test(L2)) {
                        itemRaw += '\n' + L2.trim();
                        i++;
                        continue;
                    }
                    break;
                }
                block.push({ indent: indent, raw: itemRaw });
            }
            return { block: block, nextIdx: i };
        }

        /** 将连续的列表行（无序：减号/星号/加号列表项，或有序 1. 2.，支持续行与两空格缩进嵌套）转为嵌套 ul/ol */
        function convertMarkdownLists(text) {
            const lines = text.split(/\r?\n/);
            const out = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (UL_ITEM_RE.test(line)) {
                    const collected = collectListItemsWithContinuations(lines, i, 'ul');
                    if (collected.block.length) {
                        out.push('');
                        out.push(listBlockToNestedList(collected.block, 'ul'));
                        out.push('');
                        i = collected.nextIdx;
                        continue;
                    }
                }
                if (OL_ITEM_RE.test(line)) {
                    const collected = collectListItemsWithContinuations(lines, i, 'ol');
                    if (collected.block.length) {
                        out.push('');
                        out.push(listBlockToNestedList(collected.block, 'ol'));
                        out.push('');
                        i = collected.nextIdx;
                        continue;
                    }
                }
                out.push(line);
                i++;
            }
            return out.join('\n');
        }

        function listBlockToNestedList(block, listTag) {
            if (!block.length) {
                return '';
            }
            const base = Math.min(...block.map((b) => b.indent));
            const items = block.map((b) => ({
                level: Math.max(0, Math.floor((b.indent - base) / 2)),
                content: b.raw,
            }));
            const tag = listTag === 'ol' ? 'ol' : 'ul';

            function walk(from, minLevel) {
                let h = '<' + tag + '>';
                let idx = from;
                while (idx < items.length && items[idx].level >= minLevel) {
                    if (items[idx].level !== minLevel) {
                        break;
                    }
                    const c = items[idx].content;
                    idx++;
                    let inner = '';
                    if (idx < items.length && items[idx].level > minLevel) {
                        const sub = walk(idx, minLevel + 1);
                        inner = sub.out;
                        idx = sub.nextIdx;
                    }
                    h += '<li>' + c + inner + '</li>';
                }
                h += '</' + tag + '>';
                return { out: h, nextIdx: idx };
            }
            return walk(0, 0).out;
        }

        /** 本地查看器：去掉明显危险属性，保留 div/img/a 等展示用 HTML */
        function sanitizeEmbeddedHtml(fragment) {
            let s = fragment;
            s = s.replace(/<\/script/gi, '');
            s = s.replace(/<script\b[\s\S]*?>[\s\S]*?<\/script>/gi, '');
            s = s.replace(/\s+on\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, '');
            s = s.replace(/javascript:/gi, '');
            return s;
        }

        /** 将助手回复中的整块 &lt;div&gt;...&lt;/div&gt; 抽出，避免被 escapeHtml 转义 */
        function extractRawHtmlPlaceholders(text) {
            const blocks = [];
            const re = /<div\b[^>]*>[\s\S]*?<\/div>/gi;
            const cleaned = text.replace(re, (full) => {
                const idx = blocks.length;
                blocks.push(sanitizeEmbeddedHtml(full));
                return '\n\nRAW_HTML_BLOCK_' + idx + '_END\n\n';
            });
            return { text: cleaned, blocks };
        }

        // 简单的markdown渲染器（含有序列表、脚注引用、内嵌 div HTML）
        function simpleMarkdown(text) {
            const extracted = extractRawHtmlPlaceholders(text);
            const piped = extractPipeTables(extracted.text);
            const withPlaceholders = replaceHorizontalRules(piped.text);
            const tables = piped.tables;
            const rawHtmlBlocks = extracted.blocks;

            let html = escapeHtml(withPlaceholders);
            for (let t = 0; t < tables.length; t++) {
                html = html.replace(`&lt;&lt;&lt;TABLE_${t}&gt;&gt;&gt;`, tables[t]);
            }

            // 代码块（```）
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 粗体
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');

            // Markdown 脚注引用 [^1] → 上标样式
            html = html.replace(/\[\^(\d+)\]/g, '<sup class="footnote-ref" style="font-size:0.75em;color:#6e6e73;">[$1]</sup>');

            // 标题（从多到少匹配，避免 #### 被当成 #）
            html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            html = html.replace(/MD_HORIZONTAL_RULE_PLACEHOLDER/g, '<hr>');

            html = convertMarkdownLists(html);

            // 段落
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // 清理空段落
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>\s*<(h[1-5]|ul|ol|pre|table)/g, '<$1');
            html = html.replace(/<\/(h[1-5]|ul|ol|pre|table)>\s*<\/p>/g, '</$1>');
            html = html.replace(/<p>\s*<hr\s*>\s*<\/p>/gi, '<hr>');
            html = html.replace(/<p>\s*<hr\s*>/gi, '<hr>');
            html = html.replace(/<hr\s*>\s*<\/p>/gi, '<hr>');

            // 占位符可能被包进 <p>，先剥离再注入真实 HTML
            html = html.replace(/<p>\s*RAW_HTML_BLOCK_(\d+)_END\s*<\/p>/gi, 'RAW_HTML_BLOCK_$1_END');

            for (let b = 0; b < rawHtmlBlocks.length; b++) {
                const ph = 'RAW_HTML_BLOCK_' + b + '_END';
                const wrapped = '<div class="embedded-html-block">' + rawHtmlBlocks[b] + '</div>';
                html = html.split(ph).join(wrapped);
            }

            return html;
        }

        function renderRewardInfo(reward) {
            if (!reward || !reward.reward_info) return '';

            const info = reward.reward_info;
            const ruleRewards = info.rule_reward_info || {};

            return `
                <div class="reward-info">
                    <div class="reward-info-title">📊 Reward详情</div>
                    <div class="reward-detail"><strong>最终分数:</strong> ${info.final_reward?.toFixed(3) || 'N/A'}</div>
                    <div class="reward-detail"><strong>LLM Reward:</strong> ${info.llm_reward?.toFixed(3) || 'N/A'}</div>
                    <div class="reward-detail"><strong>Reward响应:</strong> ${info.reward_response || 'N/A'}</div>
                    ${Object.keys(ruleRewards).length > 0 ? `
                        <div style="margin-top: 10px;">
                            <strong>规则奖励:</strong>
                            ${Object.entries(ruleRewards).map(([rule, data]) => `
                                <div class="reward-detail" style="margin-left: 15px;">
                                    - ${rule}: ${Array.isArray(data) ? `${data[0]} (${data[1]})` : data}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderMetadata(rollout) {
            return `
                <div class="metadata-section">
                    <div class="metadata-title">ℹ️ 元数据</div>
                    <div class="metadata-grid">
                        <div class="metadata-item"><strong>Request ID:</strong> ${rollout.request_id || 'N/A'}</div>
                        <div class="metadata-item"><strong>时间戳:</strong> ${rollout.timestamp || 'N/A'}</div>
                        <div class="metadata-item"><strong>数据源:</strong> ${rollout.data_source || 'N/A'}</div>
                        <div class="metadata-item"><strong>问题:</strong> ${rollout.question || 'N/A'}</div>
                        <div class="metadata-item"><strong>完成原因:</strong> ${rollout.finish_reason || 'N/A'}</div>
                        <div class="metadata-item"><strong>运行时间:</strong> ${rollout.run_time?.toFixed(2) || 'N/A'}s</div>
                        ${rollout.tool_usage_counts ? `
                            <div class="metadata-item"><strong>工具使用:</strong> ${JSON.stringify(rollout.tool_usage_counts)}</div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function showLoading(line1, line2) {
            line1 = line1 || '正在加载…';
            line2 = line2 || '';
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div style="color: #1d1d1f; font-weight: 500;">${escapeHtml(line1)}</div>
                    ${line2 ? `<div style="color:#86868b;font-size:14px;margin-top:10px;">${escapeHtml(line2)}</div>` : ''}
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('click', function (e) {
            const toggleBtn = e.target.closest('.btn-tool-raw-toggle');
            if (toggleBtn) {
                const id = toggleBtn.getAttribute('data-tool-raw-id');
                const pre = document.getElementById('tool-raw-' + id);
                if (pre) {
                    pre.hidden = !pre.hidden;
                    toggleBtn.textContent = pre.hidden ? '查看原始 JSON' : '隐藏原始 JSON';
                }
                return;
            }
            const copyBtn = e.target.closest('.btn-tool-raw-copy');
            if (copyBtn) {
                const id = copyBtn.getAttribute('data-tool-raw-id');
                const raw = toolCallRawStore[id];
                if (raw != null && navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(raw).then(
                        function () {
                            const o = copyBtn.textContent;
                            copyBtn.textContent = '已复制';
                            setTimeout(function () {
                                copyBtn.textContent = o;
                            }, 1500);
                        },
                        function () {
                            alert('复制失败，请检查剪贴板权限。');
                        }
                    );
                }
            }
        });
    </script>
</body>
